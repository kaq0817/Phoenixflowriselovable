name: Keep Supabase Warm

on:
  schedule:
    # 3x/day (every 8 hours) to keep Supabase from going idle.
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app keepalive route
        run: |
          curl --fail --silent --show-error https://www.ironphoenixflow.com/api/keepalive
